name: Publish packages

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish npm packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure tag commit is on main
        run: |
          git fetch origin main --tags
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Validate tag matches package versions
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$TAG_VERSION" = "$GITHUB_REF_NAME" ]; then
            echo "Expected a tag named v<package-version>, got $GITHUB_REF_NAME"
            exit 1
          fi
          export TAG_VERSION
          node -e "const fs = require('node:fs'); const expected = process.env.TAG_VERSION; for (const dir of fs.readdirSync('packages')) { const file = 'packages/' + dir + '/package.json'; const pkg = JSON.parse(fs.readFileSync(file, 'utf8')); if (pkg.version !== expected) { throw new Error(file + ' version ' + pkg.version + ' does not match tag v' + expected); } }"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Configure npm authentication
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "The NPM_TOKEN repository secret is missing or empty."
            exit 1
          fi

          printf "registry=https://registry.npmjs.org/\n" > ~/.npmrc
          printf "//registry.npmjs.org/:_authToken=%s\n" "$NODE_AUTH_TOKEN" >> ~/.npmrc
          npm whoami --registry https://registry.npmjs.org/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build:packages

      - name: Run tests
        run: pnpm test

      - name: Validate package contents
        run: pnpm pack:packages

      - name: Publish packages
        run: pnpm --filter './packages/*' publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
